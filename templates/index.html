<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Plagiarism Checker</title>
</head>
<body>
    <h1>Upload a Song to Check Similarity</h1>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="audio_file" required>
        <button type="submit">Check Similarity</button>
    </form>

    {% if error %}
        <p style="color: red;">Error: {{ error }}</p>
    {% endif %}

    {% if prediction %}
        <h2>🎧 Match Found: {{ prediction }}</h2>
        <p>🔍 Similarity Score: {{ plagiarism_percent }}%</p>
    {% endif %}
</body>
</html>
